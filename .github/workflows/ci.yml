name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-ci
          cache-on-failure: true
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Check workspace
        run: cargo check --workspace --all-targets --locked
      - name: Test workspace
        run: cargo test --workspace --locked
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Web adapter harness
        run: |
          npm --prefix apps/web run check
          npm --prefix apps/web test
          WASM_HOST_BROWSER_E2E_REQUIRED=1 npm --prefix apps/web run test:e2e
      - name: Binding harness
        run: tests/bindings/run.sh
      - name: Conformance harness
        run: tests/conformance/run.sh --profile all
      - name: Runner harness
        run: tests/runner/run.sh
      - name: Fixture harness
        run: tests/fixtures/run.sh
      - name: Language e2e harness
        run: |
          tests/e2e/languages/test-validator.sh
          tests/e2e/languages/run.sh
