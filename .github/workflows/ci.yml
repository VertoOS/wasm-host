name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Install LLVM build dependencies
        run: scripts/install_llvm_build_deps.sh
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Check workspace
        run: cargo check --workspace --all-targets --locked
      - name: Test workspace
        run: cargo test --workspace --locked
      - name: Binding harness
        run: tests/bindings/run.sh
      - name: Conformance harness
        run: tests/conformance/run.sh --profile all
      - name: Runner harness
        run: tests/runner/run.sh
      - name: Fixture harness
        run: tests/fixtures/run.sh
      - name: Language e2e harness
        run: tests/e2e/languages/run.sh
